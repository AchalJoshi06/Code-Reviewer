<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Code Reviewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1000px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }

        .tab-button {
            padding: 12px 24px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 1em;
            font-weight: 500;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-button.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-button:hover {
            color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .input-group {
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
            color: #333;
            font-size: 1.1em;
        }

        textarea {
            width: 100%;
            height: 300px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            background-color: #f9f9ff;
        }

        .file-input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        input[type="file"] {
            display: none;
        }

        .file-input-label {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 40px;
            border: 2px dashed #667eea;
            border-radius: 8px;
            background: #f9f9ff;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.1em;
            color: #667eea;
            font-weight: 500;
        }

        .file-input-label:hover {
            background: #f0f0ff;
            border-color: #764ba2;
        }

        .file-input-label.dragover {
            background: #f0f0ff;
            border-color: #764ba2;
            transform: scale(1.02);
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            flex: 1;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .results {
            margin-top: 40px;
            display: none;
        }

        .results.active {
            display: block;
        }

        .results-header {
            background: #f9f9ff;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }

        .results-header h3 {
            color: #333;
            margin-bottom: 5px;
        }

        .results-header p {
            color: #666;
            font-size: 0.95em;
        }

        .review-content {
            background: #f9f9f9;
            padding: 25px;
            border-radius: 8px;
            line-height: 1.8;
            color: #333;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            max-height: 600px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading p {
            color: #666;
            font-size: 1.1em;
        }

        .error {
            background: #fee;
            border: 2px solid #f88;
            border-radius: 8px;
            padding: 15px;
            color: #c33;
            margin-bottom: 20px;
            display: none;
        }

        .error.active {
            display: block;
        }

        .success {
            background: #efe;
            border: 2px solid #8f8;
            border-radius: 8px;
            padding: 15px;
            color: #3c3;
            margin-bottom: 20px;
            display: none;
        }

        .success.active {
            display: block;
        }

        .filename {
            color: #667eea;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .content {
                padding: 25px;
            }

            textarea {
                height: 200px;
            }

            .button-group {
                flex-direction: column;
            }

            .tabs {
                flex-direction: column;
            }

            .tab-button {
                border-bottom: none;
                border-left: 3px solid transparent;
                text-align: left;
            }

            .tab-button.active {
                border-left-color: #667eea;
                border-bottom: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 AI Code Reviewer</h1>
            <p>Get intelligent feedback on your code assignments</p>
        </div>

        <div class="content">
            <div class="error" id="errorMsg"></div>
            <div class="success" id="successMsg"></div>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-button active" onclick="switchTab('paste')">📝 Paste Code</button>
                <button class="tab-button" onclick="switchTab('upload')">📤 Upload File</button>
            </div>

            <!-- Paste Code Tab -->
            <div class="tab-content active" id="paste-tab">
                <div class="input-group">
                    <label for="languageSelect">Programming Language:</label>
                    <select id="languageSelect" style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; margin-bottom: 20px;">
                        <option value="python">Python</option>
                        <option value="javascript">JavaScript</option>
                        <option value="typescript">TypeScript</option>
                        <option value="java">Java</option>
                        <option value="cpp">C++</option>
                        <option value="c">C</option>
                        <option value="csharp">C#</option>
                        <option value="go">Go</option>
                        <option value="rust">Rust</option>
                        <option value="ruby">Ruby</option>
                        <option value="php">PHP</option>
                        <option value="swift">Swift</option>
                        <option value="kotlin">Kotlin</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="codeInput">Enter your code:</label>
                    <textarea id="codeInput" placeholder="Paste your code here..."></textarea>
                </div>
                <div class="button-group">
                    <button class="btn-primary" onclick="reviewPastedCode()">Review Code</button>
                    <button class="btn-secondary" onclick="clearCode()">Clear</button>
                </div>
            </div>

            <!-- Upload File Tab -->
            <div class="tab-content" id="upload-tab">
                <div class="input-group">
                    <label>Upload a code file:</label>
                    <div class="file-input-wrapper">
                        <input type="file" id="fileInput" accept=".py,.js,.jsx,.ts,.tsx,.java,.cpp,.cc,.cxx,.h,.hpp,.c,.cs,.go,.rs,.rb,.php,.swift,.kt,.kts" onchange="handleFileSelect()">
                        <label for="fileInput" class="file-input-label" id="dropZone">
                            📁 Click to select or drag & drop your code file here
                        </label>
                    </div>
                    <p style="color: #666; font-size: 0.9em; margin-top: 10px;">
                        Supported: Python, JavaScript, TypeScript, Java, C/C++, C#, Go, Rust, Ruby, PHP, Swift, Kotlin
                    </p>
                </div>
                <div class="button-group">
                    <button class="btn-primary" onclick="reviewUploadedFile()" id="uploadBtn" disabled>Review File</button>
                    <button class="btn-secondary" onclick="clearFile()">Clear</button>
                </div>
            </div>

            <!-- Loading Indicator -->
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Analyzing your code...</p>
            </div>

            <!-- Results -->
            <div class="results" id="results">
                <div class="results-header">
                    <h3>✅ Review Complete</h3>
                    <p id="resultFile">File: N/A</p>
                </div>
                <div class="review-content" id="reviewContent"></div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        let selectedFile = null;

        // Drag and drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                fileInput.files = files;
                handleFileSelect();
            }
        });

        function switchTab(tab) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));

            // Show selected tab
            document.getElementById(tab + '-tab').classList.add('active');
            event.target.classList.add('active');

            // Clear results
            hideResults();
        }

        function handleFileSelect() {
            const files = fileInput.files;
            if (files.length > 0) {
                selectedFile = files[0];
                document.getElementById('uploadBtn').disabled = false;
                showSuccess(`Selected: ${selectedFile.name}`);
            }
        }

        function clearCode() {
            document.getElementById('codeInput').value = '';
            hideResults();
            hideError();
            hideSuccess();
        }

        function clearFile() {
            fileInput.value = '';
            selectedFile = null;
            document.getElementById('uploadBtn').disabled = true;
            hideResults();
            hideError();
            hideSuccess();
        }

        function reviewPastedCode() {
            const code = document.getElementById('codeInput').value.trim();
            const language = document.getElementById('languageSelect').value;
            
            if (!code) {
                showError('Please enter some code to review.');
                return;
            }

            showLoading();
            hideError();
            hideSuccess();

            fetch('/api/review', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ 
                    code: code,
                    language: language
                })
            })
            .then(response => response.json())
            .then(data => {
                hideLoading();
                if (data.error) {
                    showError(data.error);
                } else {
                    const langName = document.getElementById('languageSelect').options[document.getElementById('languageSelect').selectedIndex].text;
                    document.getElementById('resultFile').textContent = `Language: ${langName} (Pasted Code)`;
                    displayReview(data.review);
                }
            })
            .catch(error => {
                hideLoading();
                showError('Error: ' + error.message);
            });
        }

        function reviewUploadedFile() {
            if (!selectedFile) {
                showError('Please select a file first.');
                return;
            }

            const formData = new FormData();
            formData.append('file', selectedFile);

            showLoading();
            hideError();
            hideSuccess();

            fetch('/api/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                hideLoading();
                if (data.error) {
                    showError(data.error);
                } else {
                    const langInfo = data.language ? ` (${data.language})` : '';
                    document.getElementById('resultFile').textContent = `File: ${data.filename}${langInfo}`;
                    displayReview(data.review);
                }
            })
            .catch(error => {
                hideLoading();
                showError('Error: ' + error.message);
            });
        }

        function displayReview(review) {
            document.getElementById('reviewContent').textContent = review;
            showResults();
        }

        function showResults() {
            document.getElementById('results').classList.add('active');
        }

        function hideResults() {
            document.getElementById('results').classList.remove('active');
        }

        function showLoading() {
            document.getElementById('loading').classList.add('active');
        }

        function hideLoading() {
            document.getElementById('loading').classList.remove('active');
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMsg');
            errorEl.textContent = message;
            errorEl.classList.add('active');
        }

        function hideError() {
            document.getElementById('errorMsg').classList.remove('active');
        }

        function showSuccess(message) {
            const successEl = document.getElementById('successMsg');
            successEl.textContent = message;
            successEl.classList.add('active');
            setTimeout(hideSuccess, 3000);
        }

        function hideSuccess() {
            document.getElementById('successMsg').classList.remove('active');
        }
    </script>
</body>
</html>
